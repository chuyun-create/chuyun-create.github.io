<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张欣杨的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 流光溢彩多色动态背景 */
            background: linear-gradient(-45deg, #ff416c, #ff4b2b, #22c1c3, #fdbb2d, #805ad5);
            background-size: 500% 500%;
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            padding: 50px 20px;
            /* 流光缓慢滚动动画 */
            animation: shineBg 8s linear infinite;
        }
        @keyframes shineBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card-wrap {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(255,255,255,0.88);
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
            animation: fadeIn 1s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #ff5e7d;
            font-size: 36px;
            margin-bottom: 12px;
            border-bottom: 3px dotted #ffc0cb;
            padding-bottom: 10px;
        }
        .item-title {
            font-size: 20px;
            color: #3d6ea8;
            margin: 22px 0 8px;
            font-weight: bold;
        }
        p {
            font-size: 17px;
            color: #444;
            line-height: 1.75;
        }
        .hobby-box {
            margin-top:10px;
        }
        .hobby-tag {
            display: inline-block;
            padding:7px 16px;
            background: #76c8ff;
            color:#fff;
            border-radius: 30px;
            margin:6px 5px;
            transition: all 0.3s ease;
        }
        .hobby-tag:hover {
            transform: translateY(-5px);
            background: #ff7b9c;
            box-shadow:0 4px 12px #ffabbc77;
        }
        .footer-text {
            margin-top:35px;
            text-align:center;
            color:#888;
            font-size:15px;
        }
    </style>
</head>
<body>
    <div class="card-wrap">
        <h1>👋 姓名：张欣杨</h1>

        <div class="info-block">
            <div class="item-title">📖 专业信息</div>
            <p>轮机工程专业在读本科生，课余主动学习计算机与网页开发知识，擅长借助各类AI工具完成创意项目。</p>
        </div>

        <div class="info-block">
            <div class="item-title">🧾 个人简介</div>
            <p>性格活泼开朗，热爱生活，动静结合，既能沉浸在文体活动中，也能静下心钻研专业与编程知识，乐于尝试新鲜事物。</p>
        </div>

        <div class="info-block">
            <div class="item-title">🎮 兴趣爱好</div>
            <div class="hobby-box">
                <span class="hobby-tag">🎤唱歌</span>
                <span class="hobby-tag">💃跳舞</span>
                <span class="hobby-tag">⛸滑冰</span>
                <span class="hobby-tag">🏓打乒乓球</span>
            </div>
        </div>

        <div class="footer-text">
            ✨ 本主页由AI生成 | 部署于GitHub Pages
        </div>
    </div>
</body>
</html>
